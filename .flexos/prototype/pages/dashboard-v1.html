<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"><title>Dashboard - flexSocial</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"><script src="https://cdn.jsdelivr.net/npm/@unocss/runtime"></script><script src="https://cdn.jsdelivr.net/npm/lucide@latest"></script><script src="https://cdn.jsdelivr.net/npm/vue@3"></script><link rel="stylesheet" href="../shared/tokens.css"><link rel="stylesheet" href="../shared/components.css"><style>:root{--brand-color:#10b981;}[v-cloak]{display:none;}body{background-color:#f3f4f6;}</style></head><body class="font-sans"><div id="app" v-cloak class="h-screen w-screen flex flex-col md:flex-row"><aside v-if="!isMobile" class="w-64 bg-white border-r border-gray-200 flex flex-col p-4"><div class="flex items-center gap-2 mb-8"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM17 13H13V17H11V13H7V11H11V7H13V11H17V13Z" fill="#10b981"/></svg><span class="font-bold text-lg">flexSocial</span></div><nav class="flex flex-col gap-2"><a v-for="item in navItems" :key="item.name" :href="item.href" :class="['flex items-center gap-3 px-3 py-2 rounded-md font-medium', item.active ? 'bg-brand-color/10 text-brand-color' : 'text-gray-600 hover:bg-gray-100']"><i :data-lucide="item.icon" class="w-5 h-5"></i><span>{{ item.name }}</span></a></nav><div class="mt-auto"><a href="landing-v1.html" class="flex items-center gap-3 px-3 py-2 rounded-md text-gray-600 hover:bg-gray-100"><i data-lucide="log-out" class="w-5 h-5"></i><span>Logout</span></a></div></aside><main class="flex-1 overflow-y-auto pb-20 md:pb-0"><div class="max-w-2xl mx-auto p-4 sm:p-6"><h1 class="text-2xl font-bold text-gray-900 mb-6">Home Feed</h1><div class="space-y-4"><div v-for="post in posts" :key="post.id" class="bg-white p-4 rounded-lg border border-gray-200"><div class="flex items-start gap-3"><img :src="post.user.avatar" class="w-10 h-10 rounded-full"><div class="flex-1"><div class="flex items-baseline gap-2"><span class="font-semibold text-gray-900">{{ post.user.name }}</span><span class="text-sm text-gray-500">@{{ post.user.handle }} &middot; {{ post.timestamp }}</span></div><p class="text-gray-800 mt-1 whitespace-pre-wrap">{{ post.content }}</p><div class="flex items-center gap-6 mt-3 text-gray-500"><button class="flex items-center gap-1.5 hover:text-red-500"><i data-lucide="heart" class="w-4 h-4"></i><span class="text-sm">{{ post.likes }}</span></button><button class="flex items-center gap-1.5 hover:text-brand-color"><i data-lucide="message-circle" class="w-4 h-4"></i><span class="text-sm">{{ post.comments }}</span></button><button class="flex items-center gap-1.5 hover:text-blue-500"><i data-lucide="repeat" class="w-4 h-4"></i><span class="text-sm">{{ post.reposts }}</span></button><button class="ml-auto hover:text-brand-color"><i data-lucide="share-2" class="w-4 h-4"></i></button></div></div></div></div></div></div></main><nav v-if="isMobile" class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex justify-around h-16 items-center"><a v-for="item in navItems" :key="item.name" :href="item.href" :class="['flex flex-col items-center justify-center w-full h-full', item.active ? 'text-brand-color' : 'text-gray-600']"><i :data-lucide="item.icon"></i><span class="text-xs mt-1">{{ item.name }}</span></a></nav></div><script src="../shared/mock-data.js"></script><script>const { createApp, ref, onMounted, onUnmounted, nextTick } = Vue;createApp({ setup() { const isMobile = ref(window.innerWidth < 768); const posts = ref([]); const navItems = ref([ { name: 'Home', icon: 'home', href: '#', active: true }, { name: 'Explore', icon: 'search', href: '#', active: false }, { name: 'Messages', icon: 'message-square', href: '#', active: false }, { name: 'Profile', icon: 'user', href: '#', active: false } ]); const checkScreen = () => { isMobile.value = window.innerWidth < 768; }; onMounted(() => { posts.value = MockData.posts; window.addEventListener('resize', checkScreen); nextTick(() => { lucide.createIcons(); }); }); onUnmounted(() => { window.removeEventListener('resize', checkScreen); }); return { isMobile, posts, navItems }; }}).mount('#app');</script></body></html>
